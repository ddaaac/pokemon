<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokemon Champions - 상성 커버리지 분석</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;background:linear-gradient(170deg,#1a0e05 0%,#2d1810 40%,#1a1005 100%);color:#f0e6d8;font-family:'Noto Sans KR',-apple-system,sans-serif;padding:16px}
h1{font-size:24px;font-weight:900;margin:4px 0 0;background:linear-gradient(90deg,#EE8130,#F7D02C,#ff6b35);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.subtitle{font-size:11px;letter-spacing:3px;color:#a08060}
.card{background:rgba(255,255,255,0.04);border-radius:14px;padding:12px;margin-bottom:16px;border:1px solid rgba(255,255,255,0.06)}
.card-title{font-size:11px;color:#a08060;font-weight:700;margin-bottom:8px}
.type-btn{border:2px solid transparent;border-radius:14px;padding:5px 12px;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;color:#a08060;background:rgba(255,255,255,0.06)}
.type-btn.active{color:#fff}
.type-btn:hover{opacity:.85}
.type-filters{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.pokemon-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:6px;max-height:350px;overflow-y:auto;padding:4px}
.pokemon-grid::-webkit-scrollbar{width:6px}
.pokemon-grid::-webkit-scrollbar-track{background:rgba(255,255,255,0.03);border-radius:3px}
.pokemon-grid::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:3px}
.poke-card{background:rgba(255,255,255,0.06);border-radius:10px;padding:8px 4px;text-align:center;cursor:pointer;transition:all .15s;border:2px solid transparent}
.poke-card:hover{background:rgba(255,255,255,0.12);transform:translateY(-2px)}
.poke-card img{width:48px;height:48px;object-fit:contain;image-rendering:pixelated}
.poke-card .name{font-size:10px;font-weight:700;margin-top:2px;line-height:1.2}
.poke-card .types{display:flex;justify-content:center;gap:2px;margin-top:3px;flex-wrap:wrap}
.poke-card .stat-tags{display:flex;justify-content:center;gap:2px;margin-top:3px;flex-wrap:wrap}
.tbadge{display:inline-block;padding:1px 5px;border-radius:8px;font-size:9px;font-weight:700;color:#fff;text-shadow:0 1px 1px rgba(0,0,0,0.3);white-space:nowrap}
.stag{display:inline-block;padding:1px 4px;border-radius:5px;font-size:8px;font-weight:700;white-space:nowrap}
.stag-atk{color:#f87171;background:rgba(248,113,113,0.15)}
.stag-spatk{color:#c084fc;background:rgba(192,132,252,0.15)}
.stag-def{color:#EE8130;background:rgba(238,129,48,0.15)}
.stag-spdef{color:#a78bfa;background:rgba(167,139,250,0.15)}
.stag-speed{color:#fbbf24;background:rgba(251,191,36,0.12)}
.selected-bar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.selected-mon{display:flex;align-items:center;gap:6px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);border-radius:10px;padding:6px 10px;cursor:pointer}
.selected-mon img{width:36px;height:36px;object-fit:contain}
.selected-mon .name{font-weight:700;font-size:12px}
.selected-mon .remove{color:#f87171;font-size:16px;margin-left:4px}
.my-team-bar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.my-mon{display:flex;align-items:center;gap:6px;background:rgba(99,144,240,0.1);border:1px solid rgba(99,144,240,0.2);border-radius:10px;padding:6px 10px;cursor:pointer}
.my-mon.editing{border-color:rgba(99,144,240,0.6);background:rgba(99,144,240,0.15)}
.my-mon img{width:36px;height:36px;object-fit:contain}
.my-mon .name{font-weight:700;font-size:12px}
.my-mon .remove{color:#6390F0;font-size:16px;margin-left:4px}
.my-mon .move-types{display:flex;gap:2px;margin-top:2px;flex-wrap:wrap}
.move-assign-panel{background:rgba(255,255,255,0.06);border-radius:10px;padding:10px;margin-bottom:10px;border:1px solid rgba(99,144,240,0.2)}
.coverage-table{width:100%;border-collapse:collapse;font-size:12px}
.coverage-table th{padding:6px 4px;text-align:center;border-bottom:2px solid rgba(255,255,255,0.1);color:#8890b5;font-size:10px;font-weight:700;position:sticky;top:0;background:#2d1810}
.coverage-table th:first-child{text-align:left}
.coverage-table td{padding:5px 4px;text-align:center;border-bottom:1px solid rgba(255,255,255,0.05)}
.coverage-table td:first-child{text-align:left}
.coverage-table tr:hover{background:rgba(255,255,255,0.03)}
.eff-cell{font-weight:700;font-size:12px;border-radius:4px;padding:2px 0}
.eff-4x{color:#ff4444;background:rgba(255,68,68,0.15)}
.eff-2x{color:#ff8844;background:rgba(255,136,68,0.1)}
.eff-1x{color:#8890b5}
.eff-half{color:#34d399;background:rgba(52,211,153,0.08)}
.eff-quarter{color:#34d399;background:rgba(52,211,153,0.12)}
.eff-zero{color:#60a5fa;background:rgba(96,165,250,0.1)}
.coverage-summary{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;margin-left:4px}
.cov-good{background:rgba(255,136,68,0.2);color:#ff8844}
.cov-neutral{background:rgba(136,144,181,0.15);color:#8890b5}
.cov-bad{background:rgba(52,211,153,0.15);color:#34d399}
.reset-btn{background:rgba(239,68,68,0.2);border:1px solid rgba(239,68,68,0.3);color:#f87171;border-radius:6px;padding:4px 12px;font-size:11px;cursor:pointer;font-weight:700}
.reset-btn:hover{background:rgba(239,68,68,0.3)}
.section-toggle{display:flex;gap:8px;margin-bottom:10px}
.section-toggle button{padding:6px 14px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:#a08060;font-size:12px;font-weight:700;cursor:pointer}
.section-toggle button.active{background:linear-gradient(135deg,#EE8130,#D85A30);color:#fff;border-color:transparent}
.empty-msg{text-align:center;padding:30px 16px;color:#5a4030;font-size:13px}
.search-input{width:100%;padding:8px 12px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.06);color:#f0e6d8;font-size:13px;margin-bottom:8px;outline:none}
.search-input:focus{border-color:rgba(238,129,48,0.4)}
.search-input::placeholder{color:#5a4030}
.add-btn{width:100%;padding:10px;border-radius:10px;border:none;color:#fff;font-size:13px;font-weight:700;cursor:pointer;margin-top:6px}
.my-col-badge{display:block;margin:1px auto;font-size:8px;font-weight:700;padding:1px 4px;border-radius:4px;white-space:nowrap}
.highlight-row{background:rgba(99,144,240,0.06)!important}
</style>
</head>
<body>
<div style="text-align:center;margin-bottom:24px">
  <div class="subtitle">POKEMON CHAMPIONS</div>
  <h1>상성 커버리지 분석기</h1>
</div>

<!-- My Team -->
<div class="card" id="myteam-section">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
    <span class="card-title" style="margin:0">내 파티 (<span id="myteam-count">0</span>/6) - 클릭하여 기술 타입 지정</span>
    <button class="reset-btn" id="myteam-reset-btn" style="display:none" onclick="resetMyTeam()">초기화</button>
  </div>
  <div class="my-team-bar" id="my-team-bar"></div>
  <div id="move-assign-area"></div>
  <div id="preset-area" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px">
    <button class="reset-btn" style="background:rgba(99,144,240,0.2);border-color:rgba(99,144,240,0.3);color:#6390F0" onclick="savePreset()">💾 프리셋 저장</button>
    <span id="preset-list"></span>
  </div>
  <div id="myteam-picker" style="display:none">
    <input type="text" class="search-input" id="myteam-search" placeholder="내 포켓몬 검색..." oninput="renderMyTeamGrid()">
    <div class="card-title">타입 필터 (최대 2개)</div>
    <div class="type-filters" id="myteam-type-filters"></div>
    <div class="pokemon-grid" id="myteam-grid"></div>
  </div>
  <button id="myteam-add-btn" class="add-btn" style="background:linear-gradient(135deg,#6390F0,#4060C0)" onclick="showMyTeamPicker()">+ 내 포켓몬 추가</button>
</div>

<!-- Opponent Selection -->
<div class="card" id="select-section">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
    <span class="card-title" style="margin:0">상대 포켓몬 선택 (<span id="sel-count">0</span>/6)</span>
    <button class="reset-btn" id="reset-btn" style="display:none" onclick="resetOpponents()">초기화</button>
  </div>
  <div class="selected-bar" id="selected-bar"></div>
  <div id="opp-picker">
    <input type="text" class="search-input" id="search-input" placeholder="상대 포켓몬 검색..." oninput="renderGrid()">
    <div class="card-title">타입 필터 (최대 2개)</div>
    <div class="type-filters" id="type-filters"></div>
    <div class="pokemon-grid" id="pokemon-grid"></div>
  </div>
  <button id="opp-expand-btn" style="display:none;width:100%;padding:8px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:#a08060;font-size:12px;font-weight:700;cursor:pointer;margin-top:6px" onclick="toggleOppPicker()">▼ 포켓몬 목록 펼치기</button>
</div>

<!-- Coverage -->
<div class="card" id="coverage-section" style="display:none">
  <div class="card-title">상성 커버리지 분석</div>
  <div class="section-toggle">
    <button class="active" onclick="switchTab('atk',this)">공격 커버리지</button>
    <button onclick="switchTab('def',this)">수비 커버리지</button>
    <button onclick="switchTab('speed',this)">스피드 비교</button>
  </div>
  <div id="coverage-content"></div>
</div>
<div class="empty-msg" id="empty-msg">상대 포켓몬을 선택하면<br>상성 커버리지 표가 나타납니다!</div>

let selectedOpponents=[],activeTypeFilters=[],myTeam=[],myTeamFilters=[],currentTab='atk',myTeamPickerOpen=false,editingMovesFor=-1;

function singleEff(a,d){return E[a]?.[d]??1}
function totalEff(a,ds){return ds.reduce((m,d)=>m*singleEff(a,d),1)}
function effLabel(m){if(m>=4)return'4x';if(m>=2)return'2x';if(m===1)return'1x';if(m===0)return'0';if(m<=0.25)return'¼';return'½'}
function effClass(m){if(m>=4)return'eff-4x';if(m>=2)return'eff-2x';if(m===1)return'eff-1x';if(m===0)return'eff-zero';if(m<=0.25)return'eff-quarter';return'eff-half'}
function typeBadge(t){return`<span class="tbadge" style="background:${TC[t]||'#888'}">${t}</span>`}
function pokeId(p){return p.dex+'_'+p.form}
function statTags(p){
  const ak=p.atkType==='물리'?'stag-atk':'stag-spatk';
  const dk=p.defType==='방어'?'stag-def':'stag-spdef';
  return`<span class="stag ${ak}">${p.atkType==='물리'?'공격':'특공'}</span><span class="stag ${dk}">${p.defType==='방어'?'방어':'특방'}</span><span class="stag stag-speed">S${p.speed}</span>`;
}
function shortName(n){return n.replace(/ *\(.*\)/,'').slice(0,4)}

// TYPE FILTER
function toggleFilter(type,arr,renderFn,elId){
  const i=arr.indexOf(type);if(i>=0)arr.splice(i,1);else{if(arr.length>=2)arr.shift();arr.push(type)}
  renderFilterBtns(arr,elId);renderFn();
}
function renderFilterBtns(arr,elId){
  const el=document.getElementById(elId);if(!el)return;
  el.innerHTML=TYPES.map(t=>{const a=arr.includes(t);return`<button class="type-btn${a?' active':''}" style="${a?'background:'+TC[t]+';border-color:'+TC[t]:''}" onclick="handleFilter('${elId}','${t}')">${t}</button>`}).join('');
}
function handleFilter(elId,t){
  if(elId==='type-filters')toggleFilter(t,activeTypeFilters,renderGrid,'type-filters');
  else if(elId==='myteam-type-filters')toggleFilter(t,myTeamFilters,renderMyTeamGrid,'myteam-type-filters');
}

function filterByTypes(list,f){if(!f.length)return list;if(f.length===1)return list.filter(p=>p.types.includes(f[0]));return list.filter(p=>f.every(x=>p.types.includes(x)))}

// OPPONENT
function getRecentOpps(){try{return JSON.parse(localStorage.getItem('poke_recent_opps')||'[]')}catch(e){return[]}}
function addRecentOpp(dex,form){
  var recent=getRecentOpps();
  var id=dex+'_'+form;
  recent=recent.filter(function(r){return r!==id});
  recent.unshift(id);
  if(recent.length>20)recent=recent.slice(0,20);
  localStorage.setItem('poke_recent_opps',JSON.stringify(recent));
}
function renderGrid(){
  const s=document.getElementById('search-input').value.trim().toLowerCase();
  const g=document.getElementById('pokemon-grid');
  let f=filterByTypes(POKEMON,activeTypeFilters);
  if(s)f=f.filter(p=>p.name.toLowerCase().includes(s));
  const ids=new Set(selectedOpponents.map(pokeId));
  f=f.filter(p=>!ids.has(pokeId(p)));
  if(!s&&!activeTypeFilters.length){
    var recent=getRecentOpps();
    var recentSet={};
    recent.forEach(function(id,i){recentSet[id]=i});
    f.sort(function(a,b){
      var ai=recentSet[pokeId(a)],bi=recentSet[pokeId(b)];
      var aHas=ai!==undefined,bHas=bi!==undefined;
      if(aHas&&!bHas)return -1;
      if(!aHas&&bHas)return 1;
      if(aHas&&bHas)return ai-bi;
      return 0;
    });
  }
  if(!f.length){g.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:20px;color:#5a4030;font-size:12px">일치하는 포켓몬이 없습니다</div>';return}
  g.innerHTML=f.map(p=>`<div class="poke-card" onclick="selPoke(${p.dex},${p.form})"><img src="${imgSrc(p)}" alt="${p.name}" loading="lazy" onerror="this.style.display='none'"><div class="name">${p.name}</div><div class="types">${p.types.map(typeBadge).join('')}</div><div class="stat-tags">${statTags(p)}</div></div>`).join('');
}
function selPoke(d,f){
  if(selectedOpponents.length>=6)return;const m=POKEMON.find(p=>p.dex===d&&p.form===f);if(!m)return;
  addRecentOpp(d,f);
  selectedOpponents.push(m);activeTypeFilters=[];document.getElementById('search-input').value='';
  renderFilterBtns(activeTypeFilters,'type-filters');renderGrid();renderSel();renderCoverage();
}
function resetOpponents(){selectedOpponents=[];activeTypeFilters=[];oppPickerForceOpen=false;document.getElementById('search-input').value='';renderFilterBtns(activeTypeFilters,'type-filters');renderGrid();renderSel();renderCoverage()}
let oppPickerForceOpen=false;
function toggleOppPicker(){
  oppPickerForceOpen=!oppPickerForceOpen;
  updateOppPicker();
}
function updateOppPicker(){
  const picker=document.getElementById('opp-picker');
  const btn=document.getElementById('opp-expand-btn');
  const full=selectedOpponents.length>=6;
  if(full&&!oppPickerForceOpen){
    picker.style.display='none';
    btn.style.display='';
    btn.textContent='▼ 포켓몬 목록 펼치기';
  }else{
    picker.style.display='';
    btn.style.display=full?'':'none';
    btn.textContent='▲ 포켓몬 목록 접기';
  }
}
function renderSel(){
  const bar=document.getElementById('selected-bar');
  document.getElementById('sel-count').textContent=selectedOpponents.length;
  document.getElementById('reset-btn').style.display=selectedOpponents.length?'':'none';
  document.getElementById('empty-msg').style.display=selectedOpponents.length?'none':'';
  document.getElementById('coverage-section').style.display=selectedOpponents.length?'':'none';
  bar.innerHTML=selectedOpponents.map((p,i)=>`<div class="selected-mon" onclick="remPoke(${i})"><img src="${imgSrc(p)}" onerror="this.style.display='none'"><div><div class="name">${p.name}</div><div style="display:flex;gap:2px;margin-top:2px">${p.types.map(typeBadge).join('')}</div><div style="margin-top:2px">${statTags(p)}</div></div><span class="remove">&times;</span></div>`).join('');
  updateOppPicker();
}
function remPoke(i){selectedOpponents.splice(i,1);oppPickerForceOpen=false;renderGrid();renderSel();renderCoverage()}

// MY TEAM
function showMyTeamPicker(){myTeamPickerOpen=true;document.getElementById('myteam-picker').style.display='';document.getElementById('myteam-add-btn').style.display='none';renderFilterBtns(myTeamFilters,'myteam-type-filters');renderMyTeamGrid()}
function hideMyTeamPicker(){myTeamPickerOpen=false;document.getElementById('myteam-picker').style.display='none';document.getElementById('myteam-add-btn').style.display=myTeam.length<6?'':'none'}
function renderMyTeamGrid(){
  const s=document.getElementById('myteam-search').value.trim().toLowerCase();
  const g=document.getElementById('myteam-grid');
  let f=filterByTypes(POKEMON,myTeamFilters);
  if(s)f=f.filter(p=>p.name.toLowerCase().includes(s));
  const ids=new Set(myTeam.map(m=>pokeId(m.mon)));
  f=f.filter(p=>!ids.has(pokeId(p)));
  if(!f.length){g.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:20px;color:#5a4030;font-size:12px">일치하는 포켓몬이 없습니다</div>';return}
  g.innerHTML=f.map(p=>`<div class="poke-card" onclick="addMyMon(${p.dex},${p.form})"><img src="${imgSrc(p)}" alt="${p.name}" loading="lazy" onerror="this.style.display='none'"><div class="name">${p.name}</div><div class="types">${p.types.map(typeBadge).join('')}</div><div class="stat-tags">${statTags(p)}</div></div>`).join('');
}
function addMyMon(d,f){
  if(myTeam.length>=6)return;const m=POKEMON.find(p=>p.dex===d&&p.form===f);if(!m)return;
  myTeam.push({mon:m,moves:[]});myTeamFilters=[];document.getElementById('myteam-search').value='';
  hideMyTeamPicker();editingMovesFor=myTeam.length-1;renderMyTeam();renderCoverage();
}
function remMyMon(i){myTeam.splice(i,1);if(editingMovesFor===i)editingMovesFor=-1;else if(editingMovesFor>i)editingMovesFor--;renderMyTeam();renderCoverage()}
function resetMyTeam(){myTeam=[];editingMovesFor=-1;myTeamFilters=[];hideMyTeamPicker();renderMyTeam();renderCoverage()}
function toggleMove(idx,type){const m=myTeam[idx];const i=m.moves.indexOf(type);if(i>=0)m.moves.splice(i,1);else{if(m.moves.length>=4)return;m.moves.push(type)}renderMyTeam();renderCoverage()}
function renderMyTeam(){
  document.getElementById('myteam-count').textContent=myTeam.length;
  document.getElementById('myteam-reset-btn').style.display=myTeam.length?'':'none';
  document.getElementById('myteam-add-btn').style.display=myTeam.length<6&&!myTeamPickerOpen?'':'none';
  const bar=document.getElementById('my-team-bar');
  bar.innerHTML=myTeam.map((m,i)=>{const p=m.mon;const mc=myMonColor(i);return`<div class="my-mon${editingMovesFor===i?' editing':''}" style="border-color:${mc}40" onclick="editingMovesFor=${i};renderMyTeam()"><div style="position:absolute;top:0;left:0;width:4px;height:100%;background:${mc};border-radius:10px 0 0 10px"></div><img src="${imgSrc(p)}" onerror="this.style.display='none'" style="margin-left:4px"><div><div class="name" style="color:${mc}">${p.name}</div><div style="display:flex;gap:2px;margin-top:2px">${p.types.map(typeBadge).join('')}</div><div class="move-types">${m.moves.length?m.moves.map(t=>`<span class="tbadge" style="background:${TC[t]};font-size:8px">${t}</span>`).join(''):'<span style="font-size:9px;color:#5a4030">기술 미설정</span>'}</div><div style="margin-top:2px">${statTags(p)}</div></div><span class="remove" onclick="event.stopPropagation();remMyMon(${i})">&times;</span></div>`}).join('');
  const area=document.getElementById('move-assign-area');
  if(editingMovesFor>=0&&editingMovesFor<myTeam.length){
    const m=myTeam[editingMovesFor],p=m.mon;
    area.innerHTML=`<div class="move-assign-panel"><div style="font-size:12px;font-weight:700;margin-bottom:6px">🎯 ${p.name} 기술 타입 선택 (${m.moves.length}/4)</div><div style="display:flex;flex-wrap:wrap;gap:4px">${TYPES.map(t=>{const s=m.moves.includes(t),full=m.moves.length>=4&&!s;return`<button class="type-btn${s?' active':''}" style="${s?'background:'+TC[t]+';border-color:'+TC[t]:''};${full?'opacity:0.3;cursor:default':''}" onclick="${full?'':'toggleMove('+editingMovesFor+',&quot;'+t+'&quot;)'}">${t}</button>`}).join('')}</div><button onclick="editingMovesFor=-1;renderMyTeam()" style="margin-top:8px;padding:4px 12px;border-radius:6px;border:none;background:rgba(255,255,255,0.1);color:#a08060;font-size:11px;cursor:pointer;font-weight:700">완료</button></div>`;
  }else area.innerHTML='';
}

// COVERAGE
function switchTab(t,b){currentTab=t;document.querySelectorAll('.section-toggle button').forEach(x=>x.classList.remove('active'));b.classList.add('active');renderCoverage()}
function renderCoverage(){
  const el=document.getElementById('coverage-content');
  if(!selectedOpponents.length){el.innerHTML='';return}
  currentTab==='atk'?renderAtk(el):currentTab==='def'?renderDef(el):renderSpeed(el);
}
function atkCellHtml(moves, oppTypes, oppAbility){
  if(!moves.length) return'<span style="color:#3a3020;font-size:10px">기술없음</span>';
  var hasLev=oppAbility==='부유';
  var results=moves.map(function(mt){var m=totalEff(mt,oppTypes);if(hasLev&&mt==='땅')m=0;return{type:mt,mult:m}}).sort(function(a,b){return b.mult-a.mult});
  var filtered=results.filter(function(r){return r.mult!==1});
  if(!filtered.length) return'<span style="color:#555;font-size:10px">등배</span>';
  var best=Math.max.apply(null,filtered.map(function(r){return r.mult}));
  var bg=best>=4?'rgba(255,68,68,0.2)':best>=2?'rgba(255,136,68,0.12)':best===0?'rgba(96,165,250,0.1)':best<1?'rgba(52,211,153,0.08)':'transparent';
  var html='<div style="background:'+bg+';border-radius:6px;padding:4px 3px;display:flex;flex-wrap:wrap;gap:3px;justify-content:center;align-items:center">';
  filtered.forEach(function(r){
    var c,lbl;
    if(r.mult>=4){c='#ff4444';lbl='4x'}
    else if(r.mult>=2){c='#ff8844';lbl='2x'}
    else if(r.mult===0){c='#60a5fa';lbl='무효'}
    else{c='#34d399';lbl=effLabel(r.mult)}
    html+='<span style="display:inline-flex;flex-direction:column;align-items:center;gap:1px"><span style="font-weight:900;color:'+c+';font-size:12px">'+lbl+'</span>'+typeBadge(r.type)+'</span>';
  });
  html+='</div>';
  return html;
}
function getOppWeakResist(oppTypes, ability){
  var w4=[],w2=[],r2=[],r4=[],imm=[];
  var hasLev=ability==='부유';
  TYPES.forEach(function(at){
    var m=totalEff(at,oppTypes);
    if(hasLev&&at==='땅')m=0;
    if(m>=4)w4.push(at);else if(m>=2)w2.push(at);
    else if(m===0)imm.push(at);else if(m<=0.25)r4.push(at);else if(m<1)r2.push(at);
  });
  return{w4:w4,w2:w2,r2:r2,r4:r4,imm:imm};
}
function effBadge(mult,t){
  if(mult>=4)return'<span style="display:inline-flex;align-items:center;gap:2px;padding:2px 6px;border-radius:8px;font-size:10px;font-weight:800;background:rgba(255,68,68,0.2);border:1px solid rgba(255,68,68,0.3)"><span style="color:#ff4444">4x</span><span class="tbadge" style="background:'+TC[t]+';font-size:9px">'+t+'</span></span>';
  if(mult>=2)return'<span style="display:inline-flex;align-items:center;gap:2px;padding:2px 6px;border-radius:8px;font-size:10px;font-weight:700;background:rgba(255,136,68,0.12);border:1px solid rgba(255,136,68,0.25)"><span style="color:#ff8844">2x</span><span class="tbadge" style="background:'+TC[t]+';font-size:9px">'+t+'</span></span>';
  if(mult===0)return'<span style="display:inline-flex;align-items:center;gap:2px;padding:2px 6px;border-radius:8px;font-size:10px;font-weight:800;background:rgba(96,165,250,0.15);border:1px solid rgba(96,165,250,0.3)"><span style="color:#60a5fa">무효</span><span class="tbadge" style="background:'+TC[t]+';font-size:9px">'+t+'</span></span>';
  if(mult<=0.25)return'<span style="display:inline-flex;align-items:center;gap:2px;padding:2px 6px;border-radius:8px;font-size:10px;font-weight:700;background:rgba(52,211,153,0.12);border:1px solid rgba(52,211,153,0.25)"><span style="color:#22c55e">&frac14;x</span><span class="tbadge" style="background:'+TC[t]+';font-size:9px">'+t+'</span></span>';
  if(mult<1)return'<span style="display:inline-flex;align-items:center;gap:2px;padding:2px 6px;border-radius:8px;font-size:10px;font-weight:700;background:rgba(52,211,153,0.08);border:1px solid rgba(52,211,153,0.15)"><span style="color:#34d399">&frac12;x</span><span class="tbadge" style="background:'+TC[t]+';font-size:9px">'+t+'</span></span>';
  return'';
}
function renderAtk(el){
  var opps=selectedOpponents,hasTeam=myTeam.some(function(m){return m.moves.length>0});
  if(!hasTeam){
    el.innerHTML='<div style="text-align:center;padding:20px;color:#5a4030;font-size:13px">내 파티와 기술을 설정하면 포켓몬별 공격 상성을 볼 수 있습니다</div>';
    return;
  }
  // Header: my pokemon column + each opponent column
  var h='<div style="font-size:11px;color:#a08060;margin-bottom:8px">내 포켓몬의 각 기술이 상대에게 주는 효과 (이중타입 반영)</div>';
  h+='<div style="overflow-x:auto"><table class="coverage-table"><thead><tr>';
  h+='<th style="min-width:100px;text-align:left">내 포켓몬</th>';
  opps.forEach(function(o){
    h+='<th style="min-width:90px"><img src="'+imgSrc(o)+'" style="width:28px;height:28px;object-fit:contain;display:block;margin:0 auto 2px" onerror="this.style.display=\'none\'">'+o.name;
    h+='<div style="margin-top:2px">'+o.types.map(function(t){return'<span class="tbadge" style="background:'+TC[t]+';font-size:7px;padding:0 3px">'+t+'</span>'}).join(' ')+'</div>';
    h+='<div style="margin-top:2px">'+statTags(o)+'</div></th>';
  });
  h+='</tr></thead><tbody>';

  // Rows: each of my Pokemon
  myTeam.forEach(function(m,mi){
    var p=m.mon;
    var mc=myMonColor(mi);
    h+='<tr style="border-left:3px solid '+mc+'">';
    h+='<td style="text-align:left;padding:6px"><div style="display:flex;align-items:center;gap:6px">';
    h+='<img src="'+imgSrc(p)+'" style="width:32px;height:32px;object-fit:contain" onerror="this.style.display=\'none\'">';
    h+='<div><div style="font-weight:700;font-size:12px;color:'+mc+'">'+p.name+'</div>';
    h+='<div style="display:flex;gap:2px;margin-top:1px">'+m.moves.map(function(t){return typeBadge(t)}).join('')+'</div>';
    h+='<div style="display:flex;gap:2px;margin-top:2px">'+statTags(p)+'</div>';
    h+='</div></div></td>';
    opps.forEach(function(opp){
      h+='<td>'+atkCellHtml(m.moves,opp.types,opp.ability)+'</td>';
    });
    h+='</tr>';
  });



  // Separator + weakness row
  h+='<tr><td colspan="'+(opps.length+1)+'" style="padding:0;border-bottom:3px solid rgba(255,136,68,0.3)"></td></tr>';
  h+='<tr style="background:rgba(255,136,68,0.04)"><td style="text-align:left;padding:6px"><span style="font-weight:700;color:#ff8844;font-size:11px">약점 타입</span></td>';
  opps.forEach(function(opp){
    var prof=getOppWeakResist(opp.types,opp.ability);
    var badges='';
    if(prof.w4.length) badges+='<div style="display:flex;flex-wrap:wrap;gap:3px;margin-bottom:3px;justify-content:center">'+prof.w4.map(function(t){return effBadge(4,t)}).join('')+'</div>';
    if(prof.w2.length) badges+='<div style="display:flex;flex-wrap:wrap;gap:3px;justify-content:center">'+prof.w2.map(function(t){return effBadge(2,t)}).join('')+'</div>';
    if(!badges) badges='<span style="color:#555;font-size:10px">없음</span>';
    h+='<td style="padding:6px;line-height:1.8;vertical-align:top">'+badges+'</td>';
  });
  h+='</tr>';
  h+='<tr style="background:rgba(52,211,153,0.03)"><td style="text-align:left;padding:6px"><span style="font-weight:700;color:#34d399;font-size:11px">반감 타입</span></td>';
  opps.forEach(function(opp){
    var prof=getOppWeakResist(opp.types,opp.ability);
    var badges='';
    if(prof.imm.length) badges+='<div style="display:flex;flex-wrap:wrap;gap:3px;margin-bottom:3px;justify-content:center">'+prof.imm.map(function(t){return effBadge(0,t)}).join('')+'</div>';
    if(prof.r4.length) badges+='<div style="display:flex;flex-wrap:wrap;gap:3px;margin-bottom:3px;justify-content:center">'+prof.r4.map(function(t){return effBadge(0.25,t)}).join('')+'</div>';
    if(prof.r2.length) badges+='<div style="display:flex;flex-wrap:wrap;gap:3px;justify-content:center">'+prof.r2.map(function(t){return effBadge(0.5,t)}).join('')+'</div>';
    if(!badges) badges='<span style="color:#555;font-size:10px">없음</span>';
    h+='<td style="padding:6px;line-height:1.8;vertical-align:top">'+badges+'</td>';
  });
  h+='</tr>';

  h+='</tbody></table></div>';
  el.innerHTML=h;
}

function defCellHtml(mult, atkType){
  // Show the attacking type badge + multiplier with better visibility for resists
  const lbl=effLabel(mult);
  if(mult>=4) return`<div style="background:rgba(255,68,68,0.2);border-radius:6px;padding:3px 2px"><span style="font-weight:900;color:#ff4444;font-size:14px">4x</span><div style="margin-top:1px">${typeBadge(atkType)}</div></div>`;
  if(mult>=2) return`<div style="background:rgba(255,136,68,0.15);border-radius:6px;padding:3px 2px"><span style="font-weight:900;color:#ff8844;font-size:13px">2x</span><div style="margin-top:1px">${typeBadge(atkType)}</div></div>`;
  if(mult===0) return`<div style="background:rgba(96,165,250,0.12);border-radius:6px;padding:3px 2px"><span style="font-weight:900;color:#60a5fa;font-size:12px">무효</span><div style="margin-top:1px">${typeBadge(atkType)}</div></div>`;
  if(mult<=0.25) return`<div style="background:rgba(52,211,153,0.15);border-radius:6px;padding:3px 2px"><span style="font-weight:900;color:#22c55e;font-size:12px">¼x</span><div style="margin-top:1px">${typeBadge(atkType)}</div></div>`;
  if(mult<1) return`<div style="background:rgba(52,211,153,0.1);border-radius:6px;padding:3px 2px"><span style="font-weight:800;color:#34d399;font-size:12px">½x</span><div style="margin-top:1px">${typeBadge(atkType)}</div></div>`;
  return`<span style="color:#555;font-size:11px">1x</span>`;
}
function defCellHtmlAll(results){
  results=results.slice().sort(function(a,b){return b.mult-a.mult});
  var filtered=results.filter(function(r){return r.mult!==1});
  if(!filtered.length) return'<span style="color:#555;font-size:10px">등배</span>';
  var best=Math.max.apply(null,filtered.map(function(r){return r.mult}));
  var worst=Math.min.apply(null,filtered.map(function(r){return r.mult}));
  var bg=best>=4?'rgba(255,68,68,0.2)':best>=2?'rgba(255,136,68,0.12)':worst===0?'rgba(96,165,250,0.1)':worst<1?'rgba(52,211,153,0.08)':'transparent';
  var html='<div style="background:'+bg+';border-radius:6px;padding:4px 3px;display:flex;flex-wrap:wrap;gap:3px;justify-content:center;align-items:center">';
  filtered.forEach(function(r){
    var c,lbl;
    if(r.mult>=4){c='#ff4444';lbl='4x'}
    else if(r.mult>=2){c='#ff8844';lbl='2x'}
    else if(r.mult===0){c='#60a5fa';lbl='무효'}
    else{c='#34d399';lbl=effLabel(r.mult)}
    html+='<span style="display:inline-flex;flex-direction:column;align-items:center;gap:1px"><span style="font-weight:900;color:'+c+';font-size:12px">'+lbl+'</span>'+typeBadge(r.type)+'</span>';
  });
  html+='</div>';
  return html;
}

function renderSpeed(el){
  const opps=selectedOpponents,hasTeam=myTeam.length>0;
  if(!hasTeam){
    el.innerHTML='<div style="text-align:center;padding:20px;color:#5a4030;font-size:13px">내 파티를 설정하면 스피드 비교를 볼 수 있습니다</div>';
    return;
  }
  // Combine all pokemon into one list with side info
  const all=[];
  myTeam.forEach((m,mi)=>{
    all.push({name:m.mon.name,speed:m.mon.speed,types:m.mon.types,side:'my',color:myMonColor(mi),img:imgSrc(m.mon),mon:m.mon});
  });
  opps.forEach(o=>{
    all.push({name:o.name,speed:o.speed,types:o.types,side:'opp',color:'#f87171',img:imgSrc(o),mon:o});
  });
  // Sort by speed descending
  all.sort((a,b)=>b.speed-a.speed);

  let h='<div style="font-size:11px;color:#a08060;margin-bottom:10px">스피드 종족값 기준 순서 (스카프/순풍 등 미반영)</div>';
  h+='<div style="display:flex;flex-direction:column;gap:4px">';

  const maxSpeed=all.length?all[0].speed:1;
  let prevSpeed=-1;
  let rank=0;
  all.forEach((p,i)=>{
    if(p.speed!==prevSpeed){rank=i+1;prevSpeed=p.speed}
    const barW=Math.max(8,Math.round(p.speed/maxSpeed*100));
    const isMy=p.side==='my';
    const bgColor=isMy?'rgba(99,144,240,0.12)':'rgba(239,68,68,0.08)';
    const borderColor=isMy?'rgba(99,144,240,0.25)':'rgba(239,68,68,0.2)';
    const speedColor=p.speed>=100?'#fbbf24':p.speed>=80?'#a08060':'#666';
    
    h+='<div style="display:flex;align-items:center;gap:8px;background:'+bgColor+';border:1px solid '+borderColor+';border-radius:10px;padding:6px 10px">';
    h+='<span style="font-size:11px;font-weight:900;color:#a08060;min-width:20px">'+rank+'</span>';
    h+='<img src="'+p.img+'" style="width:32px;height:32px;object-fit:contain" onerror="this.style.display=&quot;none&quot;">';
    h+='<div style="flex:1;min-width:0">';
    h+='<div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap">';
    h+='<span style="font-weight:700;font-size:12px;color:'+p.color+'">'+p.name+'</span>';
    p.types.forEach(t=>{h+=typeBadge(t)});
    h+='<span style="font-size:9px;color:'+(isMy?'#6390F0':'#f87171')+';font-weight:700">'+(isMy?'내 파티':'상대')+'</span>';
    h+='</div>';
    h+='<div style="display:flex;align-items:center;gap:6px;margin-top:4px">';
    h+='<span style="font-weight:900;font-size:14px;color:'+speedColor+';min-width:32px">'+p.speed+'</span>';
    h+='<div style="flex:1;height:8px;background:rgba(255,255,255,0.06);border-radius:4px;overflow:hidden">';
    h+='<div style="width:'+barW+'%;height:100%;background:linear-gradient(90deg,'+p.color+','+speedColor+');border-radius:4px;transition:width .3s"></div>';
    h+='</div></div></div></div>';
  });
  h+='</div>';

  // Speed ties
  const ties=[];
  for(let i=0;i<all.length;i++){
    for(let j=i+1;j<all.length;j++){
      if(all[i].speed===all[j].speed&&all[i].side!==all[j].side){
        ties.push([all[i],all[j]]);
      }
    }
  }
  if(ties.length){
    h+='<div style="margin-top:12px;background:rgba(251,191,36,0.08);border-radius:10px;padding:10px">';
    h+='<div style="font-size:12px;font-weight:700;color:#fbbf24;margin-bottom:6px">⚡ 동속</div>';
    ties.forEach(pair=>{
      h+='<div style="font-size:12px;margin-bottom:3px"><span style="color:'+pair[0].color+';font-weight:700">'+pair[0].name+'</span> vs <span style="color:'+pair[1].color+';font-weight:700">'+pair[1].name+'</span> — <b>'+pair[0].speed+'</b></div>';
    });
    h+='</div>';
  }

  el.innerHTML=h;
}
function renderDef(el){
  const opps=selectedOpponents,hasTeam=myTeam.length>0;
  if(!hasTeam){
    // Fallback: no team set, show type-based table
    el.innerHTML=`<div style="text-align:center;padding:20px;color:#5a4030;font-size:13px">내 파티를 설정하면 포켓몬별 수비 상성을 볼 수 있습니다</div>`;
    return;
  }
  // Precompute each my mon's full weakness/resist profile
  function getTypeProfile(types, ability){
    const w4=[],w2=[],r2=[],r4=[],imm=[];
    const hasLev=ability==='부유';
    TYPES.forEach(at=>{
      let m=totalEff(at,types);
      if(hasLev&&at==='땅')m=0;
      if(m>=4)w4.push(at);else if(m>=2)w2.push(at);
      else if(m===0)imm.push(at);else if(m<=0.25)r4.push(at);else if(m<1)r2.push(at);
    });
    return{w4,w2,r2,r4,imm};
  }

  let h=`<div style="font-size:11px;color:#a08060;margin-bottom:8px">내 포켓몬이 상대 자속 공격을 받을 때의 배율 (이중타입 반영)</div>
  <div style="overflow-x:auto"><table class="coverage-table"><thead><tr>
    <th style="min-width:100px;text-align:left">내 포켓몬</th>
    ${opps.map(o=>`<th style="min-width:70px"><img src="${imgSrc(o)}" style="width:28px;height:28px;object-fit:contain;display:block;margin:0 auto 2px" onerror="this.style.display='none'">${o.name}<div style="margin-top:2px">${o.types.map(t=>`<span class="tbadge" style="background:${TC[t]};font-size:7px;padding:0 3px">${t}</span>`).join(' ')}</div><div style="margin-top:2px">${statTags(o)}</div></th>`).join('')}
    <th>위험</th>
    <th style="min-width:160px">약점 타입</th>
    <th style="min-width:180px">반감 타입</th>
  </tr></thead><tbody>`;

  myTeam.forEach((m,mi)=>{
    const p=m.mon;
    const mc=myMonColor(mi);
    const prof=getTypeProfile(p.types, p.ability);
    const hasLevitate=p.ability==='부유';
    const cellsAll=opps.map(opp=>{
      var results=opp.types.map(at=>{var m=totalEff(at,p.types);if(hasLevitate&&at==='땅')m=0;return{type:at,mult:m}});
      var maxMult=Math.max.apply(null,results.map(r=>r.mult));
      return{results,maxMult};
    });
    const dangerCount=cellsAll.filter(c=>c.maxMult>=2).length;
    const dangerLabel=dangerCount>0?dangerCount+'개 약점':'안전';
    const dangerStyle=dangerCount>=3?'color:#ff4444;font-weight:900':dangerCount>0?'color:#ff8844;font-weight:700':'color:#34d399;font-weight:700';

    // Weakness column
    let weakHtml='';
    if(prof.w4.length)weakHtml+=`<div style="display:flex;flex-wrap:wrap;gap:3px;margin-bottom:3px">${prof.w4.map(t=>`<span style="display:inline-flex;align-items:center;gap:2px;padding:2px 6px;border-radius:8px;font-size:10px;font-weight:800;background:rgba(255,68,68,0.2);border:1px solid rgba(255,68,68,0.3)"><span style="color:#ff4444">4x</span><span class="tbadge" style="background:${TC[t]};font-size:9px">${t}</span></span>`).join('')}</div>`;
    if(prof.w2.length)weakHtml+=`<div style="display:flex;flex-wrap:wrap;gap:3px">${prof.w2.map(t=>`<span style="display:inline-flex;align-items:center;gap:2px;padding:2px 6px;border-radius:8px;font-size:10px;font-weight:700;background:rgba(255,136,68,0.12);border:1px solid rgba(255,136,68,0.25)"><span style="color:#ff8844">2x</span><span class="tbadge" style="background:${TC[t]};font-size:9px">${t}</span></span>`).join('')}</div>`;
    if(!weakHtml)weakHtml='<span style="color:#34d399;font-size:11px;font-weight:700">없음!</span>';

    // Resist column
    let resHtml='';
    if(prof.imm.length)resHtml+=`<div style="display:flex;flex-wrap:wrap;gap:3px;margin-bottom:3px">${prof.imm.map(t=>`<span style="display:inline-flex;align-items:center;gap:2px;padding:2px 6px;border-radius:8px;font-size:10px;font-weight:800;background:rgba(96,165,250,0.15);border:1px solid rgba(96,165,250,0.3)"><span style="color:#60a5fa">무효</span><span class="tbadge" style="background:${TC[t]};font-size:9px">${t}</span></span>`).join('')}</div>`;
    if(prof.r4.length)resHtml+=`<div style="display:flex;flex-wrap:wrap;gap:3px;margin-bottom:3px">${prof.r4.map(t=>`<span style="display:inline-flex;align-items:center;gap:2px;padding:2px 6px;border-radius:8px;font-size:10px;font-weight:700;background:rgba(52,211,153,0.12);border:1px solid rgba(52,211,153,0.25)"><span style="color:#22c55e">¼x</span><span class="tbadge" style="background:${TC[t]};font-size:9px">${t}</span></span>`).join('')}</div>`;
    if(prof.r2.length)resHtml+=`<div style="display:flex;flex-wrap:wrap;gap:3px">${prof.r2.map(t=>`<span style="display:inline-flex;align-items:center;gap:2px;padding:2px 6px;border-radius:8px;font-size:10px;font-weight:700;background:rgba(52,211,153,0.08);border:1px solid rgba(52,211,153,0.15)"><span style="color:#34d399">½x</span><span class="tbadge" style="background:${TC[t]};font-size:9px">${t}</span></span>`).join('')}</div>`;
    if(!resHtml)resHtml='<span style="color:#555;font-size:11px">없음</span>';

    h+=`<tr style="border-left:3px solid ${mc}">
      <td style="text-align:left;padding:6px">
        <div style="display:flex;align-items:center;gap:6px">
          <img src="${imgSrc(p)}" style="width:32px;height:32px;object-fit:contain" onerror="this.style.display='none'">
          <div>
            <div style="font-weight:700;font-size:12px;color:${mc}">${p.name}</div>
            <div style="display:flex;gap:2px;margin-top:1px">${p.types.map(t=>typeBadge(t)).join('')}</div>
          </div>
        </div>
      </td>
      ${cellsAll.map(c=>`<td>${defCellHtmlAll(c.results)}</td>`).join('')}
      <td><span style="${dangerStyle};font-size:11px">${dangerLabel}</span></td>
      <td style="text-align:left;line-height:1.6">${weakHtml}</td>
      <td style="text-align:left;line-height:1.6">${resHtml}</td>
    </tr>`;
  });

  h+=`</tbody></table></div>`;

  // Summary: which of my Pokemon is most endangered
  const dangers=myTeam.map((m,mi)=>{
    const mLev=m.mon.ability==='부유';
    const weakTo=opps.filter(opp=>opp.types.some(at=>{let e=totalEff(at,m.mon.types);if(mLev&&at==='땅')e=0;return e>=2}));
    return{mon:m.mon,idx:mi,weakTo};
  }).filter(d=>d.weakTo.length>0).sort((a,b)=>b.weakTo.length-a.weakTo.length);

  if(dangers.length>0){
    h+=`<div style="margin-top:12px;background:rgba(255,68,68,0.06);border-radius:10px;padding:10px">
      <div style="font-size:12px;font-weight:700;color:#f87171;margin-bottom:6px">⚠️ 주의 포켓몬</div>`;
    dangers.forEach(d=>{
      const c=myMonColor(d.idx);
      h+=`<div style="margin-bottom:4px">
        <span style="color:${c};font-weight:700">${d.mon.name}</span>
        → ${d.weakTo.map(o=>'<b>'+o.name+'</b>').join(', ')}에게 약점
        <span style="color:#f87171;font-weight:700">(${d.weakTo.length}/${opps.length})</span>
      </div>`;
    });
    h+=`</div>`;
  }

  const safeMons=myTeam.filter(m=>{const lv=m.mon.ability==='부유';return!opps.some(opp=>opp.types.some(at=>{let e=totalEff(at,m.mon.types);if(lv&&at==='땅')e=0;return e>=2}))});
  if(safeMons.length>0){
    h+=`<div style="margin-top:8px;background:rgba(52,211,153,0.06);border-radius:10px;padding:10px">
      <div style="font-size:12px;font-weight:700;color:#34d399;margin-bottom:4px">✅ 안전 포켓몬</div>
      <div style="display:flex;flex-wrap:wrap;gap:4px">${safeMons.map(m=>{
        const ci=myTeam.indexOf(m);
        return`<span style="color:${myMonColor(ci)};font-weight:700">${m.mon.name}</span>`;
      }).join(', ')}</div>
    </div>`;
  }

  el.innerHTML=h;
}

// MY TEAM COLORS - 6 distinct colors for each slot
const MY_COLORS=['#6390F0','#EE8130','#7AC74C','#F95587','#F7D02C','#96D9D6'];
function myMonColor(idx){return MY_COLORS[idx%MY_COLORS.length]}

// LOCALSTORAGE
function saveTeamToLS(){
  const data=myTeam.map(m=>({dex:m.mon.dex,form:m.mon.form,moves:m.moves}));
  localStorage.setItem('poke_myteam',JSON.stringify(data));
}
function loadTeamFromLS(){
  try{
    const raw=localStorage.getItem('poke_myteam');
    if(!raw){
      const defMon=POKEMON.find(p=>p.dex===655&&p.form===1);
      if(defMon)myTeam=[{mon:defMon,moves:["불꽃","풀","에스퍼","페어리"]}];
      const defOpp=POKEMON.find(p=>p.dex===154&&p.form===1);
      if(defOpp)selectedOpponents=[defOpp];
      return;
    }
    const data=JSON.parse(raw);
    myTeam=data.map(d=>{const mon=POKEMON.find(p=>p.dex===d.dex&&p.form===d.form);return mon?{mon,moves:d.moves||[]}:null}).filter(Boolean);
  }catch(e){}
}

// PRESETS
function getPresets(){try{return JSON.parse(localStorage.getItem('poke_presets')||'[]')}catch(e){return[]}}
function savePreset(){
  if(!myTeam.length){alert('파티가 비어있습니다');return}
  const name=prompt('프리셋 이름을 입력하세요:',myTeam.map(m=>m.mon.name.replace(/ *\(.*\)/,'')).join('/'));
  if(!name)return;
  const presets=getPresets();
  const data=myTeam.map(m=>({dex:m.mon.dex,form:m.mon.form,moves:m.moves}));
  presets.push({name,team:data});
  localStorage.setItem('poke_presets',JSON.stringify(presets));
  renderPresets();
}
function loadPreset(idx){
  const presets=getPresets();
  if(!presets[idx])return;
  myTeam=presets[idx].team.map(d=>{const mon=POKEMON.find(p=>p.dex===d.dex&&p.form===d.form);return mon?{mon,moves:d.moves||[]}:null}).filter(Boolean);
  editingMovesFor=-1;
  saveTeamToLS();renderMyTeam();renderCoverage();
}
function deletePreset(idx){
  const presets=getPresets();presets.splice(idx,1);
  localStorage.setItem('poke_presets',JSON.stringify(presets));
  renderPresets();
}
function renderPresets(){
  const el=document.getElementById('preset-list');
  const presets=getPresets();
  el.innerHTML=presets.map((p,i)=>`<button onclick="loadPreset(${i})" style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:#f0e6d8;border-radius:6px;padding:3px 10px;font-size:10px;cursor:pointer;font-weight:700">${p.name}<span onclick="event.stopPropagation();deletePreset(${i})" style="color:#f87171;margin-left:4px;cursor:pointer">&times;</span></button>`).join('');
}

// Override renderMyTeam to save to LS
const _origRenderMyTeam=renderMyTeam;
renderMyTeam=function(){_origRenderMyTeam();saveTeamToLS();renderPresets()}

function init(){
  loadTeamFromLS();
  renderFilterBtns(activeTypeFilters,'type-filters');
  renderGrid();renderSel();renderMyTeam();renderPresets();renderCoverage();
}
init();
</script>
